<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 Cute Treasure Hunt 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffe9f2,#fff7fa);
height:100vh;
}

/* Background Sparkles */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 2px,transparent 2px);
background-size:35px 35px;
opacity:.35;
pointer-events:none;
}

h1{
margin-top:20px;
text-align:center;
font-family:'Pacifico',cursive;
font-size:42px;
color:white;
text-shadow:3px 3px 8px hotpink;
}

#score{

margin:18px auto;
width:220px;
text-align:center;

background:rgba(255,255,255,.4);

backdrop-filter:blur(10px);

padding:12px;

border-radius:25px;

font-size:25px;

font-weight:bold;

color:#ff2d75;

}

.heart{

position:absolute;

font-size:42px;

cursor:pointer;

animation:float 2s ease-in-out infinite;

transition:.3s;

user-select:none;

}

.heart:hover{

transform:scale(1.4);

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

}

#win{

display:none;

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

background:white;

padding:35px;

border-radius:30px;

text-align:center;

width:330px;

box-shadow:0 10px 40px rgba(0,0,0,.3);

animation:popup .6s;

}

@keyframes popup{

from{

transform:translate(-50%,-50%) scale(.5);

opacity:0;

}

to{

transform:translate(-50%,-50%) scale(1);

opacity:1;

}

}

#win h2{

color:#ff4f88;

margin-bottom:15px;

font-size:34px;

}

#win p{

font-size:18px;

margin:12px;

color:#555;

line-height:1.6;

}

button{

margin-top:15px;

padding:12px 28px;

border:none;

border-radius:30px;

background:linear-gradient(45deg,#ff4f88,#ff88b0);

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<h1>💖 Find All Hidden Hearts 💖</h1>

<div id="score">

Found ❤️

<span id="count">0</span>/10

</div>

<div id="win">

<h2>🌸 Congratulations 🌸</h2>

<p>You found every hidden heart! 💖</p>

<p>

Dear <b>Barathi Akka</b> 🌷<br><br>

May your life always be filled with happiness, smiles, and endless love. ❤️✨

</p>

<p>💝 You are awesome! 💝</p>

<button onclick="location.reload()">

Play Again 💕

</button>

</div>

<script>

let found=0;

for(let i=0;i<10;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*(window.innerWidth-60)+"px";

heart.style.top=Math.random()*(window.innerHeight-100)+70+"px";

heart.onclick=function(){

this.style.transform="scale(2)";

this.style.opacity="0";

setTimeout(()=>{

this.remove();

},300);

found++;

document.getElementById("count").innerHTML=found;

if(found==10){

document.getElementById("win").style.display="block";

confetti();

}

}

document.body.appendChild(heart);

}

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.innerHTML=["💖","🌸","✨","💕","💗"][Math.floor(Math.random()*5)];

c.style.position="absolute";

c.style.left=Math.random()*window.innerWidth+"px";

c.style.top="-50px";

c.style.fontSize=(20+Math.random()*20)+"px";

c.style.transition="4s linear";

document.body.appendChild(c);

setTimeout(()=>{

c.style.top=window.innerHeight+"px";

c.style.transform="rotate(720deg)";

},50);

setTimeout(()=>{

c.remove();

},4500);

}

}

</script>

</body>
</html>
